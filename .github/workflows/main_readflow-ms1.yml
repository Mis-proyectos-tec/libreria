name: Deploy MS1 Spring Boot to Azure

on:
  push:
    branches: [main]
    paths:
      - 'microservicios/ms1-springboot/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd microservicios/ms1-springboot
          mvn clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: readflow-ms1
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_MS1 }}
          package: microservicios/ms1-springboot/target/app.jar
