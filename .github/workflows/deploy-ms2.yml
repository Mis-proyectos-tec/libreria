name: Deploy MS2 to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'microservicios/ms2-nodejs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'readflow-ms2'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_MS2 }}
          package: './microservicios/ms2-nodejs'
